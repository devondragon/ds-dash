# ds-dash configuration
# Copy this file to ~/.ds-dash/config.toml and fill in your values.

[server]
# Port the daemon listens on. Open http://localhost:PORT in any browser tab.
port = 7766
# Bind address. Default "127.0.0.1" = loopback only (recommended). Set to
# "0.0.0.0" or a specific LAN IP (e.g. "192.168.1.42") to access the
# dashboard from other devices on your network — only do this on a
# trusted LAN, since the daemon has no auth and exposes private data
# (GitHub, calendar, scratchpad).
# host = "127.0.0.1"

[ui]
# Label shown in the header strip ("OPERATOR://NAME"). If unset, falls back
# to the $USER environment variable (uppercased). Set to your handle/callsign.
# operator_name = "your_name"

[github]
# Create a fine-grained personal access token at:
#   https://github.com/settings/tokens?type=beta
# Required scopes (read-only):
#   - "Issues" (read)
#   - "Pull requests" (read)
#   - "Metadata" (read, implicit)
# For private repo activity in the heatmap, also grant "Contents (read)".
token = "ghp_replace_me"
username = "your_github_login"
# Poll interval in seconds. GitHub allows 5000 req/hr for authenticated users,
# so 180s here is conservative and uses well under 100 req/hr.
poll_seconds = 180

# Future providers (commented out for now — wire up as we add them):

# Linear — repeat one [[linear]] block per workspace. You can have N workspaces;
# each gets its own panel labeled with the `label` value. Get a personal API key
# at: Linear → Settings → API → Create Personal API Key
#
# [[linear]]
# label = "WORK"             # short, all-caps; shown as "LINEAR · WORK" panel title
# api_key = "lin_api_..."
# poll_seconds = 90          # default 90; minimum enforced at 60
# # Which Linear WorkflowState types to show. Default below = the three open
# # types. Add "completed" to include Done, "canceled" to include Cancelled.
# # Server-side filter, so excluded states cost no bandwidth.
# show_state_types = ["backlog", "unstarted", "started"]
#
# [[linear]]
# label = "PERSONAL"
# api_key = "lin_api_..."
# poll_seconds = 90

[motion]
# Get a personal API key at: Motion -> Settings -> API & Integrations
# api_key = "..."
poll_seconds = 60

[calendar]
# Path to ical-buddy. Auto-detected at /opt/homebrew/bin/icalBuddy or via PATH
# if omitted. Install with: brew install ical-buddy
# ical_buddy_path = "/opt/homebrew/bin/icalBuddy"
look_ahead_days = 1
poll_seconds = 60

[claude]
# Pulls authoritative 5h/weekly utilization directly from Anthropic's
# rate-limit response headers using your Claude Code OAuth credentials
# (read from ~/.claude/.credentials.json or the macOS keychain item
# "Claude Code-credentials" — same place `claude` itself reads them).
# Each poll makes one 1-token Messages API request, so this also burns
# a sliver of quota — keep the interval at minutes, not seconds.
poll_seconds = 300

# [gmail]
# # OAuth credentials path (Google Cloud project)
# credentials = "~/.ds-dash/gmail-credentials.json"
# token = "~/.ds-dash/gmail-token.json"

[system]
poll_seconds = 5

[network]
# WAN IP / ISP / region come from ipinfo.io. The free tier (no token) allows
# ~1k requests/day; polling at 300s burns 288/day. Add a token at ipinfo.io
# if you want more headroom or richer data.
# ipinfo_token = "..."
poll_seconds = 300

[weather]
# Header weather chip. Two keyless APIs in series: zippopotam.us resolves
# the postal code to lat/lon once at startup, then Open-Meteo provides the
# current temperature + WMO condition.
# zip = "94110"           # required to enable the chip
# country = "US"          # ISO-3166-1 alpha-2; default US
# units = "F"             # "F" or "C"; default F
# label = "HQ"            # override the displayed location (defaults to city)
poll_seconds = 900        # weather doesn't move fast; 15 min is plenty
